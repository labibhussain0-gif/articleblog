name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file for production build
        run: |
          cat > .env << EOF
          VITE_SANITY_PROJECT_ID=r9p19ugf
          VITE_SANITY_DATASET=production
          VITE_SANITY_API_VERSION=2026-03-25
          EOF
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ARTICLEBLOGWEBSITE }}
          channelId: live
          projectId: articleblogwebsite
